name: liv_dashboard
description: LIV Smart Farm — Mobile Dashboard (Flutter)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:           # ← NEW: RTL + locale support
    sdk: flutter
  # Real-time connection to the Node.js backend
  socket_io_client: ^2.0.3+1
  # HTTP for REST API calls
  http: ^1.2.1
  # Charts for vitals & motion trends
  fl_chart: ^0.68.0
  # Icons
  cupertino_icons: ^1.0.6
  # State management
  provider: ^6.1.2
  # Date formatting
  intl: ^0.20.2
  # Shared preferences (for server URL persistence + locale persistence)
  shared_preferences: ^2.2.3
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: false
  assets:
    - .env
